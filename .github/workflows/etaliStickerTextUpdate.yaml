name: Update etaliStickersExplain text with last commit date
on:
  push:
    paths:
      - documents/etaliStickersExplain.md
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-explain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Get last commit date
        run: |
          DATE=$(git log -1 --format=%cd -- documents/etaliStickersExplain.md)
          echo "LAST_COMMIT_DATE=$DATE" >> $GITHUB_ENV

      - name: Update explain
        run: |
          sed -i "s|Last Explanation Update:.*|Last Explanation Update:\*\* $LAST_COMMIT_DATE|g" documents/etaliStickersExplain.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -am "Update etaliStickersExplain.md with last text commit date"
          git push
